image: maven:3.9-eclipse-temurin-21

pipelines:
  default:
    - step:
        name: Build and Test
        caches:
          - maven
        script:
          - mvn -B clean verify
        artifacts:
          - target/*.jar

  branches:
    main:
      - step:
          name: Build, Test and Package
          caches:
            - maven
          script:
            - mvn -B clean package -DskipTests=false
          artifacts:
            - target/*.jar
